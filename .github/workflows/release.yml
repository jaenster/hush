name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v0.1.0)"
        required: true

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: macos-14, target: aarch64-macos }
          - { os: macos-13, target: x86_64-macos }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - name: Install libsodium
        run: brew install libsodium

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build (ReleaseFast)
        run: zig build -Doptimize=ReleaseFast

      - name: Package
        env:
          TAG: ${{ steps.tag.outputs.tag }}
          TARGET: ${{ matrix.target }}
        run: |
          asset="hush-${TAG}-${TARGET}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${asset}" -C zig-out/bin hush hushd hush-bar
          ( cd dist && shasum -a 256 "${asset}" > "${asset}.sha256" )

      - uses: actions/upload-artifact@v4
        with:
          name: dist-${{ matrix.target }}
          path: dist/*

  release:
    name: publish
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: echo "tag=${{ github.event.inputs.tag || github.ref_name }}" >> "$GITHUB_OUTPUT"

      - uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: |
          gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1 \
            && gh release upload "$TAG" dist/* --repo "$GITHUB_REPOSITORY" --clobber \
            || gh release create "$TAG" dist/* --repo "$GITHUB_REPOSITORY" \
                 --title "hush $TAG" --generate-notes
