site_name: hush
site_description: macOS-local secrets daemon — ssh-agent, but for environment variables
site_url: https://hush.typeguru.nl
repo_url: https://github.com/jaenster/hush
repo_name: jaenster/hush
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - content.code.copy
    - content.action.edit

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - pymdownx.highlight
  - pymdownx.superfences

nav:
  - Home: README.md
  - Getting started: getting-started.md
  - CLI reference: cli.md
  - Key providers: key-providers.md
  - Provider federation: providers.md
  - Project manifest: manifest.md
  - Security model: security.md
  - Wire protocol: protocol.md
  - Architecture: architecture.md
